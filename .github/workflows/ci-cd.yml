name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: malekbelh
          password: Malek123&

      - name: Build and Push Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./flask-app
          push: true
          tags: malekbelh/flask-todo-app:latest